# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/explore_bangladesh?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=[Give your password]
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.h2.console.enabled=false

# Basic Security
spring.security.user.name=test
spring.security.user.password=test

geoapify.api.key=[Give api key]
geoapify.base-url=https://api.geoapify.com/v2/places

amadeus.api.key=[Give api key]
amadeus.api.secret=[Give secret key]
amadeus.base-url=https://test.api.amadeus.com

# Country settings
hotels.country.code=BD
hotels.country.name=Bangladesh

