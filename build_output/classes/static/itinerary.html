<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itinerary Details - Explore Bangladesh</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link rel="stylesheet" href="./styles.css">
<style>
body { background: #f5f6fa; display: flex; flex-direction: column; min-height: 100vh; }

/* Hero */
.plan-hero {
    height: 380px; background-size: cover; background-position: center; position: relative;
}
.hero-back-btn {
    position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    display: inline-flex; align-items: center; gap: 6px;
    background: #1565c0; color: #fff;
    border: 1px solid #0d47a1;
    border-radius: 999px; padding: 8px 14px;
    font-size: 0.86rem; font-weight: 600; text-decoration: none;
    box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
    transition: all 0.2s ease;
    z-index: 8;
}
.hero-back-btn:hover {
    color: #fff;
    background: #0d47a1;
    border-color: #08306b;
}
.plan-hero-overlay {
    position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.75) 100%);
    display: flex; flex-direction: column; justify-content: flex-end; padding: 40px 30px; color: #fff;
}
.plan-hero-overlay h1 { font-size: 2.1rem; font-weight: 800; margin-bottom: 10px; }
.plan-meta { display: flex; flex-wrap: wrap; gap: 16px; font-size: 0.88rem; opacity: 0.9; margin-bottom: 10px; }
.plan-meta span { display: flex; align-items: center; gap: 6px; }
.plan-hero-price { font-size: 1.75rem; font-weight: 800; }
.plan-hero-price small { font-size: 0.9rem; font-weight: 400; opacity: 0.7; }

.tier-badge {
    display: inline-block; padding: 4px 14px; border-radius: 20px;
    font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
}
.tier-budget { background: #4caf50; color: #fff; }
.tier-standard { background: #2196f3; color: #fff; }
.tier-premium { background: #ff9800; color: #fff; }

.plan-description-box {
    max-width: 900px; margin: -30px auto 0; background: #fff; border-radius: 18px;
    padding: 28px 30px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); position: relative; z-index: 5;
}
.plan-description-box p { font-size: 0.96rem; color: #444; line-height: 1.7; margin-bottom: 14px; }
.plan-highlights-row { display: flex; flex-wrap: wrap; gap: 8px; }
.highlight-pill {
    background: #f0f4ff; color: #3f51b5; font-size: 0.82rem; padding: 5px 14px;
    border-radius: 20px; font-weight: 500; display: flex; align-items: center; gap: 5px;
}

/* Cost Breakdown */
#costBreakdown {
    max-width: 900px; margin: 24px auto; background: #fff; border-radius: 18px;
    padding: 24px 30px; box-shadow: 0 6px 22px rgba(0,0,0,0.06);
}
#costBreakdown h4 { font-weight: 700; margin-bottom: 16px; color: #1a1a2e; display: flex; align-items: center; gap: 8px; }
.cost-bar { display: flex; height: 14px; border-radius: 10px; overflow: hidden; margin-bottom: 18px; }
.cost-segment { transition: width 0.5s; }
.cost-legend { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
.cost-item { display: flex; align-items: center; gap: 8px; font-size: 0.88rem; }
.cost-item i { font-size: 1.1rem; }
.cost-cat { font-weight: 600; color: #333; min-width: 100px; }
.cost-amt { font-weight: 700; color: #1a1a2e; }
.cost-desc { color: #888; font-size: 0.8rem; }

/* Day Tabs */
.day-tabs-wrap {
    max-width: 900px; margin: 24px auto 0; display: flex; gap: 8px;
    overflow-x: auto; padding: 0 16px;
}
.day-tab {
    padding: 10px 24px; border: 2px solid #e0e0e0; border-radius: 30px; background: #fff;
    font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.25s; white-space: nowrap;
    color: #555;
}
.day-tab:hover { border-color: #667eea; color: #667eea; }
.day-tab.active { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border-color: transparent; }

/* Timeline */
.day-timeline-wrap { max-width: 900px; margin: 0 auto 40px; padding: 0 16px; }
.day-header { margin: 24px 0 20px; }
.day-header h3 { font-size: 1.25rem; font-weight: 700; color: #1a1a2e; display: flex; align-items: center; gap: 8px; }
.day-summary { color: #666; font-size: 0.9rem; margin-top: 4px; }

.timeline { position: relative; padding-left: 80px; }
.timeline::before {
    content: ''; position: absolute; left: 68px; top: 0; bottom: 0;
    width: 3px; background: linear-gradient(180deg, #667eea 0%, #764ba2 100%); border-radius: 2px;
}
.timeline-item { display: flex; margin-bottom: 20px; position: relative; }
.timeline-time {
    position: absolute; left: -80px; width: 65px; text-align: right;
    display: flex; flex-direction: column; align-items: flex-end; padding-top: 12px;
}
.time-start { font-size: 0.82rem; font-weight: 700; color: #333; }
.time-sep { font-size: 0.7rem; color: #aaa; line-height: 1; }
.time-end { font-size: 0.78rem; color: #888; }

.timeline-dot {
    position: absolute; left: -14px; top: 14px; width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; z-index: 2;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.timeline-dot i { font-size: 0.85rem; color: #fff; }

.timeline-content { flex: 1; margin-left: 24px; }
.timeline-card {
    background: #fff; border-radius: 14px; padding: 16px 20px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.06); transition: all 0.25s;
}
.timeline-card:hover { box-shadow: 0 6px 22px rgba(0,0,0,0.1); transform: translateY(-2px); }
.tc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.tc-header h5 { font-size: 1rem; font-weight: 700; color: #1a1a2e; margin: 0; }
.tc-cost {
    background: #e8f5e9; color: #2e7d32; font-size: 0.82rem; font-weight: 700;
    padding: 3px 10px; border-radius: 10px; white-space: nowrap;
}
.tc-desc { font-size: 0.88rem; color: #555; line-height: 1.5; margin-bottom: 6px; }
.tc-location { font-size: 0.82rem; color: #888; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
.tc-tips {
    font-size: 0.82rem; color: #f57c00; background: #fff8e1; padding: 6px 12px;
    border-radius: 8px; margin-top: 6px;
}

/* Fallback back link for no-id/error states */
.fallback-back-link {
    max-width: 900px; margin: 20px auto 0; padding: 0 16px;
}
.fallback-back-link a {
    display: inline-flex; align-items: center; gap: 6px;
    color: #667eea; font-weight: 600; text-decoration: none; font-size: 0.95rem;
}
.fallback-back-link a:hover { color: #764ba2; }

.footer { margin-top: auto; }

@media(max-width:768px) {
    .plan-hero { height: 280px; }
    .plan-hero-overlay h1 { font-size: 1.45rem; }
    .hero-back-btn {
        top: 14px; left: 50%; transform: translateX(-50%);
        padding: 7px 12px;
        font-size: 0.82rem;
    }
    .timeline { padding-left: 60px; }
    .timeline::before { left: 48px; }
    .timeline-time { left: -60px; width: 45px; }
    .timeline-dot { left: -14px; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="py-3 border-bottom bg-white">
<div class="container-fluid d-flex gap-3 align-items-center justify-content-between navbar-container">
    <a href="index.html" class="d-flex align-items-center link-body-emphasis text-decoration-none">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 7h22M4 15h22M4 23h22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>

          <nav class="main-navigation d-none d-lg-block">

      </nav>

</div>

<!-- Fallback Back Link (shown on no-id/error states) -->

<!-- Content -->
<div id="itineraryContent">
    <div id="planHeader"></div>
    <div id="costBreakdown"></div>
    <div class="day-tabs-wrap" id="dayTabs"></div>
