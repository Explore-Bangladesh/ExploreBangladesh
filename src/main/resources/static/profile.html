<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Explore Bangladesh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./styles.css">
    <style>
        .profile-container {
            min-height: 100vh;
            background: #f8f9fa;
            padding: 40px 0;
        }

        .profile-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            margin: 0 auto;
            padding: 30px;
        }

        .profile-img-container {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #667eea;
            margin-bottom: 15px;
        }

        .btn-update {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
        }

        .btn-update:hover {
            background: #5a6cd6;
        }

        .alert-message {
            display: none;
        }
    </style>
</head>
<body>

<header class="py-3 border-bottom bg-white">
    <div class="container-fluid d-flex gap-3 align-items-center justify-content-between navbar-container">
        <div>
            <a href="index.html" class="d-flex align-items-center link-body-emphasis text-decoration-none">
                <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 7h22M4 15h22M4 23h22" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
            </a>
        </div>
        <nav class="main-navigation d-none d-lg-block">
            <ul class="nav justify-content-center">
                <li><a href="hotels.html" class="nav-link px-2 text-dark">Hotels</a></li>
                <li><a href="flights.html" class="nav-link px-2 text-dark">Flights</a></li>
                <li><a href="cars.html" class="nav-link px-2 text-dark">Cars</a></li>
                <li><a href="travel-plans.html" class="nav-link px-2 text-dark">Packages</a></li>
                <li><a href="guides.html" class="nav-link px-2 text-dark">Travel Guide</a></li>
                <li><a href="places.html" class="nav-link px-2 text-dark">Nearby Places</a></li>
            </ul>
        </nav>
        <div class="text-end d-flex align-items-center gap-2" id="authActions">
            <a href="login.html" class="btn btn-outline-primary me-2" id="loginBtn">Login</a>
            <a href="signup.html" class="btn btn-primary" id="signupBtn">Sign-up</a>
            <div class="dropdown d-none position-relative" id="userMenu" style="display: none;">
                  <button class="btn btn-light rounded-circle p-0" id="avatarBtn" type="button" aria-expanded="false" aria-haspopup="true" style="width: 40px; height: 40px; overflow: hidden; flex-shrink: 0;">
                    <img id="avatarImg" src="Assets/default_user.jpg" alt="Profile" style="width: 100%; height: 100%; object-fit: cover;" />
                </button>
                <ul class="dropdown-menu dropdown-menu-end" id="avatarDropdown">
                    <li><a class="dropdown-item" href="#" id="profileLink"><i class="bi bi-person me-2"></i>Profile</a></li>
                    <li>
                        <hr class="dropdown-divider">
                    </li>
                    <li><a class="dropdown-item" href="#" id="logoutLink"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                </ul>
            </div>
        </div>
    </div>
</header>

<div class="profile-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="profile-card">
                    <h2 class="text-center mb-4">My Profile</h2>
                    
                    <div id="alertMessage" class="alert alert-success alert-message" role="alert">
                        Profile updated successfully!
                    </div>
                    <div id="errorMessage" class="alert alert-danger alert-message" role="alert">
                        Failed to update profile.
                    </div>

                    <form id="profileForm">
                        <div class="profile-img-container">
                            <img id="profilePreview" src="Assets/default_user.jpg" alt="Profile Image" class="profile-img">
                            <div>
                                <label for="imageUpload" class="btn btn-outline-primary btn-sm">
                                    <i class="bi bi-camera"></i> Change Photo
                                </label>
                                <input type="file" id="imageUpload" class="d-none" accept="image/*">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">First Name</label>
                                <input type="text" id="firstName" class="form-control" placeholder="First Name">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Last Name</label>
                                <input type="text" id="lastName" class="form-control" placeholder="Last Name">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email <small class="text-muted">(Read-only)</small></label>
                            <input type="email" id="email" class="form-control" readonly disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="text" id="phone" class="form-control" placeholder="Phone Number">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Date of Birth</label>
                                <input type="date" id="dob" class="form-control">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Country</label>
                                <input type="text" id="country" class="form-control" placeholder="Country">
                            </div>
                        </div>

                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input" id="subscribeNewsletter">
                            <label class="form-check-label" for="subscribeNewsletter">Subscribe to newsletter</label>
                        </div>

                        <button type="submit" class="btn btn-update" id="saveBtn">
                            Save Changes
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="./js/auth.js"></script>
<script src="./js/navbar.js"></script>
<script src="./js/profile.js"></script>
</body>
</html>
