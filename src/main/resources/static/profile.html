<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Explore Bangladesh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .profile-container {
            min-height: 100vh;
            background: #f8f9fa;
            padding: 40px 0;
        }

        .profile-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            margin: 0 auto;
            padding: 30px;
        }

        .profile-img-container {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #667eea;
            margin-bottom: 15px;
        }

        .btn-update {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
        }

        .btn-update:hover {
            background: #5a6cd6;
        }

        .alert-message {
            display: none;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Explore Bangladesh</a>
        <div class="d-flex">
            <a href="/" class="btn btn-outline-light me-2">Home</a>
            <button id="logoutBtn" class="btn btn-danger">Logout</button>
        </div>
    </div>
</nav>

<div class="profile-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="profile-card">
                    <h2 class="text-center mb-4">My Profile</h2>
                    
                    <div id="alertMessage" class="alert alert-success alert-message" role="alert">
                        Profile updated successfully!
                    </div>
                    <div id="errorMessage" class="alert alert-danger alert-message" role="alert">
                        Failed to update profile.
                    </div>

                    <form id="profileForm">
                        <div class="profile-img-container">
                            <img id="profilePreview" src="Assets/default_user.jpg" alt="Profile Image" class="profile-img">
                            <div>
                                <label for="imageUpload" class="btn btn-outline-primary btn-sm">
                                    <i class="bi bi-camera"></i> Change Photo
                                </label>
                                <input type="file" id="imageUpload" class="d-none" accept="image/*">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">First Name</label>
                                <input type="text" id="firstName" class="form-control" placeholder="First Name">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Last Name</label>
                                <input type="text" id="lastName" class="form-control" placeholder="Last Name">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email <small class="text-muted">(Read-only)</small></label>
                            <input type="email" id="email" class="form-control" readonly disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="text" id="phone" class="form-control" placeholder="Phone Number">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Date of Birth</label>
                                <input type="date" id="dob" class="form-control">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Country</label>
                                <input type="text" id="country" class="form-control" placeholder="Country">
                            </div>
                        </div>

                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input" id="subscribeNewsletter">
                            <label class="form-check-label" for="subscribeNewsletter">Subscribe to newsletter</label>
                        </div>

                        <button type="submit" class="btn btn-update" id="saveBtn">
                            Save Changes
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/profile.js"></script>
</body>
</html>
