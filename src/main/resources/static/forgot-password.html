<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Explore Bangladesh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8fafc;
        }

        .forgot-container {
            min-height: calc(100vh - 80px);
            background: linear-gradient(135deg, #42a5f5 0%, #0096FF 50%, #0078d4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        .forgot-container::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            top: -100px;
            left: -100px;
            animation: float 6s ease-in-out infinite;
        }

        .forgot-container::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(0, 150, 255, 0.1);
            border-radius: 50%;
            bottom: -50px;
            right: -50px;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(20px); }
        }

        .forgot-wrapper {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 150, 255, 0.2);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .forgot-form-section {
            padding: 50px 40px;
        }

        @media (max-width: 767px) {
            .forgot-form-section {
                padding: 40px 30px;
            }
        }

        .form-header {
            margin-bottom: 35px;
            text-align: center;
        }

        .form-header .icon {
            font-size: 48px;
            color: #0096FF;
            margin-bottom: 15px;
        }

        .form-header h2 {
            font-size: 28px;
            font-weight: 700;
            color: #0096FF;
            margin-bottom: 10px;
        }

        .form-header p {
            color: #718096;
            font-size: 14px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-label {
            display: block;
            margin-bottom: 10px;
            color: #2d3748;
            font-weight: 600;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            color: #0096FF;
            font-size: 18px;
            pointer-events: none;
        }

        .form-control {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #f7fafc;
        }

        .form-control:focus {
            outline: none;
            border-color: #0096FF;
            background: white;
            box-shadow: 0 0 0 4px rgba(0, 150, 255, 0.1);
        }

        .form-control::placeholder {
            color: #cbd5e0;
        }

        .forgot-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0096FF 0%, #0078D4 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .forgot-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 150, 255, 0.3);
        }

        .forgot-btn:active {
            transform: translateY(0);
        }

        .forgot-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .back-link {
            text-align: center;
            color: #718096;
            font-size: 14px;
        }

        .back-link a {
            color: #0096FF;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #0078D4;
            text-decoration: underline;
        }

        .alert {
            border-radius: 12px;
            border: none;
            margin-bottom: 20px;
            padding: 12px 15px;
            font-size: 14px;
        }

        .alert-success {
            background: #ecfdf5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }

        .alert-danger {
            background: #fef2f2;
            color: #7f1d1d;
            border-left: 4px solid #ef4444;
        }

        .alert-info {
            background: #eff6ff;
            color: #1e40af;
            border-left: 4px solid #3b82f6;
        }

        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
            border-width: 0.25em;
        }

        .step-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 12px;
            color: #718096;
        }

        .step-indicator .step {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #e2e8f0;
            font-weight: 600;
            color: #718096;
        }

        .step-indicator .step.active {
            background: #0096FF;
            color: white;
        }

        .step-indicator .divider {
            flex: 1;
            height: 2px;
            background: #e2e8f0;
        }
    </style>
</head>
<body>
<header class="py-3 border-bottom bg-white">
    <div class="container-fluid d-flex gap-3 align-items-center justify-content-between navbar-container">
        <div>
            <a href="index.html" class="d-flex align-items-center link-body-emphasis text-decoration-none">
                <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 7h22M4 15h22M4 23h22" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
            </a>
        </div>
        <nav class="main-navigation d-none d-lg-block">
            <ul class="nav justify-content-center">
                <li><a href="hotels.html" class="nav-link px-2 text-dark">Hotels</a></li>
                <li><a href="flights.html" class="nav-link px-2 text-dark">Flights</a></li>
                <li><a href="cars.html" class="nav-link px-2 text-dark">Cars</a></li>
                <li><a href="travel-plans.html" class="nav-link px-2 text-dark">Packages</a></li>
                <li><a href="guides.html" class="nav-link px-2 text-dark">Travel Guide</a></li>
                <li><a href="places.html" class="nav-link px-2 text-dark">Nearby Places</a></li>
                <li><a href="smart-planner/smart-planner.html" class="nav-link px-2 text-dark">✈️ Smart Planner</a></li>
            </ul>
        </nav>
        <div class="text-end d-flex align-items-center gap-2" id="authActions">
            <a href="login.html" class="btn btn-outline-primary me-2">Login</a>
            <a href="signup.html" class="btn btn-primary">Sign-up</a>
        </div>
    </div>
</header>

<div class="forgot-container">
    <div class="forgot-wrapper">
        <div class="forgot-form-section">
            <div class="form-header">
                <div class="icon">🔐</div>
                <h2>Reset Password</h2>
                <p>Enter your email address and we'll send you a link to reset your password</p>
            </div>

            <div id="alertContainer"></div>

            <form id="forgotPasswordForm" onsubmit="return handleForgotPassword(event)">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <i class="bi bi-envelope input-icon"></i>
                        <input type="email" class="form-control" id="email" required placeholder="Enter your email">
                    </div>
                </div>

                <button type="submit" class="forgot-btn" id="submitBtn">Send Reset Link</button>

                <div class="back-link">
                    Remember your password? <a href="login.html">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    async function handleForgotPassword(event) {
        event.preventDefault();

        const email = document.getElementById('email').value;
        const submitBtn = document.getElementById('submitBtn');
        const alertContainer = document.getElementById('alertContainer');
        const originalText = submitBtn.innerHTML;

        // Show loading state
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Sending...';
        submitBtn.disabled = true;
        alertContainer.innerHTML = '';

        try {
            const response = await fetch(`/api/v1/auth/forgot-password?email=${encodeURIComponent(email)}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            });

            const data = await response.json();

            if (response.ok) {
                // Show success message
                alertContainer.innerHTML = `
                    <div class="alert alert-success" role="alert">
                        <i class="bi bi-check-circle me-2"></i>
                        ${data.message}
                    </div>
                `;

                // Clear form
                document.getElementById('forgotPasswordForm').reset();

                // Hide form and show confirmation
                setTimeout(() => {
                    document.getElementById('forgotPasswordForm').style.display = 'none';
                    document.querySelector('.form-header').innerHTML = `
                        <div class="icon">✅</div>
                        <h2>Check Your Email</h2>
                        <p>We've sent a password reset link to <strong>${email}</strong>. The link is valid for 15 minutes.</p>
                    `;
                    
                    const div = document.createElement('div');
                    div.className = 'alert alert-info';
                    div.innerHTML = `
                        <i class="bi bi-info-circle me-2"></i>
                        If you don't see the email in a few minutes, check your spam folder.
                    `;
                    alertContainer.appendChild(div);

                    const backBtn = document.createElement('a');
                    backBtn.href = 'login.html';
                    backBtn.className = 'forgot-btn';
                    backBtn.style.marginBottom = '0';
                    backBtn.innerHTML = '<i class="bi bi-arrow-left me-2"></i> Back to Login';
                    alertContainer.parentElement.appendChild(backBtn);
                }, 1500);

            } else {
                alertContainer.innerHTML = `
                    <div class="alert alert-danger" role="alert">
                        <i class="bi bi-exclamation-circle me-2"></i>
                        ${data.error || 'An error occurred. Please try again.'}
                    </div>
                `;
            }

        } catch (error) {
            console.error('Error:', error);
            alertContainer.innerHTML = `
                <div class="alert alert-danger" role="alert">
                    <i class="bi bi-exclamation-circle me-2"></i>
                    Network error. Please check your connection and try again.
                </div>
            `;
        } finally {
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }

        return false;
    }

    // Auto-fill email from URL parameter if provided
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const emailParam = urlParams.get('email');
        if (emailParam) {
            document.getElementById('email').value = decodeURIComponent(emailParam);
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/navbar.js"></script>
</body>
</html>
