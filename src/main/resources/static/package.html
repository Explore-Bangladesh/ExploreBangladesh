<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Travel Packages - Explore Bangladesh</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link rel="stylesheet" href="./styles.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
/* Hero Section */
.package-hero {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 80px 0 60px;
    color: white;
    text-align: center;
}

/* Search Bar */
.search-bar {
    background: linear-gradient(135deg, #fed8ff, #d5b5ff);
    border-radius: 25px;           
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    padding: 28px 35px;            
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    align-items: center;
    justify-content: center;
    max-width: 1050px;
    margin: auto;
    margin-top: -40px;
    transition: all 0.3s ease;
}
.search-bar input, .search-bar select, .search-bar button {
    flex: 1;
    min-width: 160px;
    padding: 12px 18px;
    border-radius: 12px;
    border: 1px solid #cce4f6;
    font-size: 1rem;
    transition: all 0.3s ease;
}
.search-bar input:focus, .search-bar select:focus {
    border-color: #4fc3f7;
    box-shadow: 0 0 10px rgba(79,195,247,0.3);
    outline: none;
}
.search-bar button {
    padding: 12px 30px;
    background: #9578e6;
    color: white;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s ease;
}
.search-bar button:hover {
    background: #36b0f0;
    box-shadow: 0 5px 15px rgba(79,195,247,0.3);
}
@media(max-width:768px) {
    .search-bar { flex-direction: column; }
}

/* Filter/Budget */
.filter {
    background: linear-gradient(135deg,#f1f0af,#dca3f7);
    padding:20px 25px;
    border-radius:25px;
    color:rgb(59, 47, 47);
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    max-width: 950px;  
    margin: 25px auto;
    margin-bottom:30px;
    backdrop-filter: blur(8px);
}
.budget-label{
    font-size:1.4rem;       
    font-weight:700;          
    display:flex;
    align-items:center;
    gap:10px;                
    margin-bottom:15px;
    color:#3a2a2a;            
    text-shadow: 0 1px 2px rgba(0,0,0,0.1); 
}
.budget-label i{ color:#ff9f9b; font-size:1.5rem; }
#budgetValue{ background:white; color:#9c6bdc; padding:4px 10px; border-radius:8px; font-weight:bold; margin-left:8px; }
.filter input[type=range] {
    appearance: none; -webkit-appearance: none;
    width:100%; height:8px; border-radius:10px;
    margin-top:10px;
    background: linear-gradient(to right,#908dce,#575460);
    outline:none;
}

/* Packages Grid (Dynamic) */
.container 
{ 
max-width:1000px;
margin:auto;
padding:20px;
}
.package-card 
{
   
    background:rgb(232, 232, 232);
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(0,0,0,0.12);
    transition:transform 0.3s ease, box-shadow 0.3s ease;
    display:flex;
    flex-direction:column;
    height:100%;
}
.package-card:hover { transform: translateY(-8px);
    box-shadow:0 18px 40px rgba(0,0,0,0.18);}
.package-card img { width:100%; height:200px; object-fit:cover; border-bottom:1px solid #eee; }
.package-body { padding:15px; display:flex; flex-direction:column; flex-grow:1; }
.package-body h5 { margin:0 0 10px 0; font-size:1.2rem; line-height:1.3; height:48px; overflow:hidden; }
.package-price { color:#6366f1; font-weight:bold; font-size:1.1rem; }
.package-body button { margin-top:10px; width:100%; padding:10px; background:#8385ff; color:white; border:none; border-radius:10px; cursor:pointer; }
.package-features span { margin-right:8px; }

/* Map */
#map { 
height:400px;
margin-top:30px;
border-radius:15px;
max-width:1000px;
margin-left:auto;
margin-right:auto;
}

/* Modal */
.modal { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; }
.modal-content { background:white; padding:20px; border-radius:15px; width:300px; }
.modal-content input { width:100%; padding:10px; margin-top:10px; margin-bottom:15px; }
.modal-content button { width:100%; padding:12px; background:#6366f1; color:white; border:none; border-radius:10px; cursor:pointer; }

/* Footer */
body { display:flex; flex-direction:column; min-height:100vh; }
.footer { margin-top:auto; }
</style>
</head>
<body>

<!-- Header -->
<header class="py-3 border-bottom bg-white">
<div class="container-fluid d-flex gap-3 align-items-center justify-content-between">
    <a href="index.html" class="d-flex align-items-center link-body-emphasis text-decoration-none">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 7h22M4 15h22M4 23h22" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
    </a>
    <nav class="main-navigation d-none d-lg-block">
        <ul class="nav justify-content-center">
            <li><a href="hotels.html" class="nav-link px-2 text-dark">Hotels</a></li>
            <li><a href="flights.html" class="nav-link px-2 text-dark">Flights</a></li>
            <li><a href="cars.html" class="nav-link px-2 text-dark">Cars</a></li>
            <li><a href="package.html" class="nav-link px-2 text-primary fw-bold">Packages</a></li>
            <li><a href="guides.html" class="nav-link px-2 text-dark">Travel Guide</a></li>
        </ul>
    </nav>
    <div class="text-end">
        <a href="login.html" class="btn btn-outline-primary me-2">Login</a>
        <a href="signup.html" class="btn btn-primary">Sign-up</a>
    </div>
</div>
</header>

<!-- Hero Section -->
<section class="package-hero">
    <div class="container text-center">
        <h1 class="display-5 fw-bold mb-3">Choose Your Adventure, Pack Your Dreams</h1>
        <p class="lead">From essentials to extras, we’ve got your perfect package covered</p>
    </div>
</section>

<!-- Search / Filter -->
<div class="search-bar">
<input type="text" placeholder="e.g., Dhaka, Cox's Bazar, Sylhet" id="searchDestination">
<input type="date" id="checkin">
<input type="date" id="checkout">
<select id="guests">
    <option value="1">1 Guest</option>
    <option value="2" selected>2 Guests</option>
    <option value="3">3 Guests</option>
    <option value="4">4 Guests</option>
</select>
<button onclick="filterPackages()">Search</button>
</div>

<div class="filter">
<label class="budget-label"><i class="fas fa-wallet"></i> Customize Your Budget</label>
<input type="range" id="budgetRange" min="4000" max="20000" value="20000" />
<span id="budgetValue">৳20,000</span>
</div>


<div class="container mt-4">
    <div class="row g-4 justify-content-center" id="packageContainer"></div>
</div>


<!-- Map -->
<div class="container">
<h2 class="text-center mt-5">Destinations Map</h2>
<div id="map"></div>
</div>

<!-- Booking Modal -->
<div class="modal" id="bookingModal">
<div class="modal-content">
<h3 id="packageTitle"></h3>
<form onsubmit="submitBooking(event)">
<input placeholder="Your Name" required />
<input placeholder="Email" required type="email" />
<button type="submit">Confirm Booking</button>
</form>
</div>
</div>

<!-- Footer -->
<footer class="footer bg-dark text-light pt-5 pb-3">
<div class="container">
<div class="row">
<div class="col-md-6 text-center text-md-start">
<p class="text-muted small mb-0">&copy; 2026 Explore Bangladesh. All rights reserved.</p>
</div>
<div class="col-md-6 text-center text-md-end">
<p class="text-muted small mb-0">Made with <span class="text-danger">♥</span> in Bangladesh</p>
</div>
</div>
</div>
</footer>

<!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./js/package.js"></script>

</body>
</html>
