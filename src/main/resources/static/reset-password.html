<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Explore Bangladesh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8fafc;
        }

        .reset-container {
            min-height: calc(100vh - 80px);
            background: linear-gradient(135deg, #42a5f5 0%, #0096FF 50%, #0078d4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        .reset-container::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            top: -100px;
            left: -100px;
            animation: float 6s ease-in-out infinite;
        }

        .reset-container::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(0, 150, 255, 0.1);
            border-radius: 50%;
            bottom: -50px;
            right: -50px;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(20px); }
        }

        .reset-wrapper {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 150, 255, 0.2);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .reset-form-section {
            padding: 50px 40px;
        }

        @media (max-width: 767px) {
            .reset-form-section {
                padding: 40px 30px;
            }
        }

        .form-header {
            margin-bottom: 35px;
            text-align: center;
        }

        .form-header .icon {
            font-size: 48px;
            color: #0096FF;
            margin-bottom: 15px;
        }

        .form-header h2 {
            font-size: 28px;
            font-weight: 700;
            color: #0096FF;
            margin-bottom: 10px;
        }

        .form-header p {
            color: #718096;
            font-size: 14px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-label {
            display: block;
            margin-bottom: 10px;
            color: #2d3748;
            font-weight: 600;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            color: #0096FF;
            font-size: 18px;
            pointer-events: none;
            z-index: 1;
        }

        .form-control {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #f7fafc;
        }

        .form-control:focus {
            outline: none;
            border-color: #0096FF;
            background: white;
            box-shadow: 0 0 0 4px rgba(0, 150, 255, 0.1);
        }

        .form-control::placeholder {
            color: #cbd5e0;
        }

        .password-field-wrap {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #a0aec0;
            background: none;
            border: none;
            font-size: 18px;
            transition: color 0.3s ease;
            z-index: 10;
        }

        .password-toggle:hover {
            color: #0096FF;
        }

        .password-input .form-control {
            padding-right: 55px;
        }

        .reset-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0096FF 0%, #0078D4 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 150, 255, 0.3);
        }

        .reset-btn:active {
            transform: translateY(0);
        }

        .reset-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .back-link {
            text-align: center;
            color: #718096;
            font-size: 14px;
        }

        .back-link a {
            color: #0096FF;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #0078D4;
            text-decoration: underline;
        }

        .alert {
            border-radius: 12px;
            border: none;
            margin-bottom: 20px;
            padding: 12px 15px;
            font-size: 14px;
        }

        .alert-success {
            background: #ecfdf5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }

        .alert-danger {
            background: #fef2f2;
            color: #7f1d1d;
            border-left: 4px solid #ef4444;
        }

        .alert-warning {
            background: #fffbeb;
            color: #92400e;
            border-left: 4px solid #fbbf24;
        }

        .alert-info {
            background: #eff6ff;
            color: #1e40af;
            border-left: 4px solid #3b82f6;
        }

        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
            border-width: 0.25em;
        }

        .password-strength {
            margin-top: 8px;
            font-size: 12px;
        }

        .strength-bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
            background: #ef4444;
        }

        .strength-fill.weak {
            width: 33%;
            background: #ef4444;
        }

        .strength-fill.medium {
            width: 66%;
            background: #f59e0b;
        }

        .strength-fill.strong {
            width: 100%;
            background: #10b981;
        }

        .strength-text {
            color: #718096;
            font-weight: 500;
        }

        .requirements {
            margin-top: 12px;
            padding: 12px;
            background: #f7fafc;
            border-radius: 8px;
            font-size: 12px;
            color: #718096;
        }

        .requirements ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .requirements li {
            padding: 4px 0;
        }

        .requirements li.met {
            color: #10b981;
        }

        .requirements i {
            margin-right: 6px;
            font-size: 10px;
        }
    </style>
</head>
<body>
<header class="py-3 border-bottom bg-white">
    <div class="container-fluid d-flex gap-3 align-items-center justify-content-between navbar-container">
        <div>
            <a href="index.html" class="d-flex align-items-center link-body-emphasis text-decoration-none">
                <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 7h22M4 15h22M4 23h22" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
            </a>
        </div>
        <nav class="main-navigation d-none d-lg-block">
            <ul class="nav justify-content-center">
                <li><a href="hotels.html" class="nav-link px-2 text-dark">Hotels</a></li>
                <li><a href="flights.html" class="nav-link px-2 text-dark">Flights</a></li>
                <li><a href="cars.html" class="nav-link px-2 text-dark">Cars</a></li>
                <li><a href="travel-plans.html" class="nav-link px-2 text-dark">Packages</a></li>
                <li><a href="guides.html" class="nav-link px-2 text-dark">Travel Guide</a></li>
                <li><a href="places.html" class="nav-link px-2 text-dark">Nearby Places</a></li>
                <li><a href="smart-planner/smart-planner.html" class="nav-link px-2 text-dark">✈️ Smart Planner</a></li>
            </ul>
        </nav>
        <div class="text-end d-flex align-items-center gap-2" id="authActions">
            <a href="login.html" class="btn btn-outline-primary me-2">Login</a>
            <a href="signup.html" class="btn btn-primary">Sign-up</a>
        </div>
    </div>
</header>

<div class="reset-container">
    <div class="reset-wrapper">
        <div class="reset-form-section">
            <div class="form-header">
                <div class="icon">🔐</div>
                <h2>Create New Password</h2>
                <p>Enter a strong password to secure your account</p>
            </div>

            <div id="alertContainer"></div>

            <form id="resetPasswordForm" onsubmit="return handleResetPassword(event)">
                <!-- New Password Field -->
                <div class="form-group password-input">
                    <label class="form-label">New Password</label>
                    <div class="input-wrapper">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" class="form-control" id="newPassword" required placeholder="Enter new password">
                        <button type="button" class="password-toggle" onclick="togglePassword('newPassword')">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <div class="strength-text" id="strengthText">Weak</div>
                    </div>
                    <div class="requirements">
                        <ul>
                            <li id="req-length"><i class="bi bi-circle"></i> At least 6 characters</li>
                            <li id="req-upper"><i class="bi bi-circle"></i> At least one uppercase letter</li>
                            <li id="req-number"><i class="bi bi-circle"></i> At least one number</li>
                        </ul>
                    </div>
                </div>

                <!-- Confirm Password Field -->
                <div class="form-group password-input">
                    <label class="form-label">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" class="form-control" id="confirmPassword" required placeholder="Confirm password">
                        <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="reset-btn" id="submitBtn">Reset Password</button>

                <div class="back-link">
                    <a href="login.html">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    // Verify token on page load
    window.addEventListener('DOMContentLoaded', async function() {
        if (!token) {
            showAlert('Invalid or missing token. Please request a new password reset.', 'danger');
            document.getElementById('resetPasswordForm').style.display = 'none';
            return;
        }

        try {
            const response = await fetch(`/api/v1/auth/verify-reset-token?token=${encodeURIComponent(token)}`);
            const data = await response.json();

            if (!data.valid) {
                showAlert(data.message || 'Token is invalid or expired. Please request a new password reset.', 'danger');
                document.getElementById('resetPasswordForm').style.display = 'none';
                // Add redirect button
                const resetForm = document.querySelector('.reset-form-section');
                const backBtn = document.createElement('a');
                backBtn.href = 'forgot-password.html';
                backBtn.className = 'reset-btn';
                backBtn.innerHTML = '<i class="bi bi-arrow-left me-2"></i> Request New Reset Link';
                resetForm.appendChild(backBtn);
            }
        } catch (error) {
            console.error('Error verifying token:', error);
            showAlert('Error verifying token. Please try again.', 'danger');
            document.getElementById('resetPasswordForm').style.display = 'none';
        }

        // Add password strength checker
        document.getElementById('newPassword').addEventListener('input', checkPasswordStrength);
    });

    function togglePassword(inputId) {
        const input = document.getElementById(inputId);
        const toggle = input.parentElement.querySelector('.password-toggle');
        const icon = toggle.querySelector('i');

        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
        }
    }

    function checkPasswordStrength() {
        const password = document.getElementById('newPassword').value;
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');

        const reqLength = document.getElementById('req-length');
        const reqUpper = document.getElementById('req-upper');
        const reqNumber = document.getElementById('req-number');

        // Check requirements
        const length = password.length >= 6;
        const upper = /[A-Z]/.test(password);
        const number = /[0-9]/.test(password);

        // Update requirement items
        updateRequirement(reqLength, length);
        updateRequirement(reqUpper, upper);
        updateRequirement(reqNumber, number);

        // Calculate strength
        let strength = 'weak';
        let classToRemove = ['weak', 'medium', 'strong'];

        if (length) {
            classToRemove.splice(classToRemove.indexOf('weak'), 1);
            if (upper && number) {
                strength = 'strong';
                classToRemove = ['weak', 'medium'];
            } else if (upper || number) {
                strength = 'medium';
                classToRemove = ['weak', 'strong'];
            } else {
                strength = 'weak';
                classToRemove = ['medium', 'strong'];
            }
        } else {
            strength = 'weak';
            classToRemove = ['medium', 'strong'];
        }

        // Update strength bar
        classToRemove.forEach(c => strengthFill.classList.remove(c));
        strengthFill.classList.add(strength);
        strengthText.textContent = strength.charAt(0).toUpperCase() + strength.slice(1);
    }

    function updateRequirement(element, met) {
        if (met) {
            element.classList.add('met');
            element.querySelector('i').classList.remove('bi-circle');
            element.querySelector('i').classList.add('bi-check-circle-fill');
        } else {
            element.classList.remove('met');
            element.querySelector('i').classList.remove('bi-check-circle-fill');
            element.querySelector('i').classList.add('bi-circle');
        }
    }

    async function handleResetPassword(event) {
        event.preventDefault();

        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const submitBtn = document.getElementById('submitBtn');
        const originalText = submitBtn.innerHTML;

        // Validation
        if (newPassword !== confirmPassword) {
            showAlert('Passwords do not match. Please try again.', 'danger');
            return false;
        }

        if (newPassword.length < 6) {
            showAlert('Password must be at least 6 characters long.', 'danger');
            return false;
        }

        // Show loading state
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Resetting...';
        submitBtn.disabled = true;

        try {
            const response = await fetch(`/api/v1/auth/reset-password?token=${encodeURIComponent(token)}&newPassword=${encodeURIComponent(newPassword)}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            });

            const data = await response.json();

            if (response.ok) {
                showAlert(data.message, 'success');
                document.getElementById('resetPasswordForm').style.display = 'none';
                document.querySelector('.form-header').innerHTML = `
                    <div class="icon">✅</div>
                    <h2>Password Reset Successful</h2>
                    <p>Your password has been reset successfully. Redirecting to login page...</p>
                `;

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } else {
                showAlert(data.error || 'Failed to reset password. Please try again.', 'danger');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }

        } catch (error) {
            console.error('Error:', error);
            showAlert('Network error. Please check your connection and try again.', 'danger');
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }

        return false;
    }

    function showAlert(message, type) {
        const alertContainer = document.getElementById('alertContainer');
        alertContainer.innerHTML = `
            <div class="alert alert-${type}" role="alert">
                <i class="bi ${getAlertIcon(type)} me-2"></i>
                ${message}
            </div>
        `;
    }

    function getAlertIcon(type) {
        const icons = {
            'success': 'bi-check-circle',
            'danger': 'bi-exclamation-circle',
            'warning': 'bi-exclamation-triangle',
            'info': 'bi-info-circle'
        };
        return icons[type] || 'bi-info-circle';
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/navbar.js"></script>
</body>
